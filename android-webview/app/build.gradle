plugins {
    id "com.android.application"
}

android {
    namespace "com.aicc.console"
    compileSdk 35

    buildFeatures {
        buildConfig true
    }

    defaultConfig {
        applicationId "com.aicc.console"
        minSdk 26
        targetSdk 35
        versionCode 1
        versionName "1.0.0"

        buildConfigField "String", "AICC_URL", "\"https://aicc-management-console.vercel.app/\""
    }
}
